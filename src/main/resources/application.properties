spring.application.name=netadmin
spring.datasource.url=jdbc:mysql://localhost:3307/taller_db


# Credenciales
spring.datasource.username=root
spring.datasource.password=root

# Driver de la base de datos
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de Hibernate (JPA)
# 'update' crea o modifica las tablas automáticamente según tus entidades
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Columnas en BD: snake_case a partir de atributos camelCase en las entidades
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.CamelCaseToUnderscoresNamingStrategy